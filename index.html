<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Seguro - Samy</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0088cc; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .preview { width: 100%; height: 150px; background: #f9f9f9; border: 2px dashed #ccc; border-radius: 10px; margin-top: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 Samy Registro</h2>
        <form id="formSamy">
            <div class="field">
                <label>Género Biológico</label>
                <select id="genero" required>
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                </select>
            </div>
            <div class="field">
                <label>Foto Frontal ID</label>
                <input type="file" id="foto1" accept="image/*" capture="environment" required>
                <div class="preview" id="p1">Preview</div>
            </div>
            <div class="field">
                <label>Foto Posterior ID</label>
                <input type="file" id="foto2" accept="image/*" capture="environment" required>
                <div class="preview" id="p2">Preview</div>
            </div>
            <button type="submit" class="btn" id="subirBtn">Enviar Documentos</button>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN
        const SB_URL = "https://fsdqvdxvhqauyqczgsfb.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM";
        const CLOUD_NAME = "dluwuj6wg";
        const UPLOAD_PRESET = "samy_docs";

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const userId = new URLSearchParams(window.location.search).get('id');

        // Previsualización
        document.getElementById('foto1').onchange = e => { document.getElementById('p1').innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}">`; };
        document.getElementById('foto2').onchange = e => { document.getElementById('p2').innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}">`; };

        async function subirCloudinary(file) {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', UPLOAD_PRESET);
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            return data.secure_url;
        }

        document.getElementById('formSamy').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subirBtn');
            btn.disabled = true; btn.innerText = "Subiendo... (Max 200kb)";

            try {
                const url1 = await subirCloudinary(document.getElementById('foto1').files[0]);
                const url2 = await subirCloudinary(document.getElementById('foto2').files[0]);

                const { error } = await supabaseClient.from('profiles').update({
                    genero_biologico: document.getElementById('genero').value,
                    img_id_frontal: url1,
                    img_id_posterior: url2,
                    status: 'en_revision'
                }).eq('id', userId);

                if (error) throw error;
                alert("¡Documentos enviados! Samy te avisará la aprobación.");
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false; btn.innerText = "Reintentar";
            }
        };
    </script>
</body>
</html>
