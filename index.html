<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy - Plataforma Integral</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0088cc; --gold: #ffcc00; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* Capa de Bloqueo (Overlay) */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); 
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }

        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        
        /* Interfaz de Fondo (Samy App) */
        .app-container { filter: blur(2px); pointer-events: none; padding: 20px; transition: 0.5s; }
        .app-active { filter: blur(0); pointer-events: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .map-placeholder { width: 100%; height: 200px; background: #ddd; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        
        /* Botón Soberano */
        #btnAdmin { display: none; background: var(--gold); color: black; font-weight: bold; border: none; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 10px; width: 100%; }

        /* Estilos Formulario */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .readonly-field { background: #eee; cursor: not-allowed; color: #666; }
    </style>
</head>
<body>

    <div id="mainApp" class="app-container">
        <div class="header">
            <h2 id="welcomeName">Samy App</h2>
            <div id="userBalance" style="font-weight: bold;">Bolsa: $0</div>
        </div>
        <div class="map-placeholder">📍 Mapa de Samy (PostGIS Activo)</div>
        <button class="btn-main" onclick="alert('Solicitando servicio...')">🚖 Pedir Samy</button>
        <button id="btnAdmin" onclick="toggleAduana()">👑 PANEL DE ADUANA</button>
    </div>

    <div id="overlay">
        <div id="regCard" class="card">
            <h2 id="modalTitle">🚀 Registro Legal</h2>
            <p id="modalDesc">Completa tu identidad para activar Samy.</p>
            
            <form id="formSamy">
                <input type="text" id="full_name" placeholder="Nombre Completo" required>
                <input type="number" id="cedula" placeholder="Número de Cédula" required>
                <input type="text" id="phone_display" class="readonly-field" readonly>
                
                <label>Género</label>
                <select id="genero">
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                </select>

                <p style="font-size: 10px;">👤 Foto Perfil | 🪪 Cédula Frontal | 🪪 Cédula Trasera</p>
                <input type="file" id="f_perfil" accept="image/*" required>
                <input type="file" id="f_frontal" accept="image/*" required>
                
                <button type="submit" class="btn-main" id="btnSubmit">Enviar a Revisión</button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN (Usa tus credenciales de Supabase)
        const SB_URL = "https://fsdqvdxvhqauyqczgsfb.supabase.co";
        const SB_KEY = "tu_anon_key_aqui"; // Pon tu clave aquí
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // Capturar datos de la URL del Edge Function
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const userPhone = urlParams.get('phone');
        const ADMIN_PHONE = "573145210546"; // Tu número real

        document.getElementById('phone_display').value = userPhone ? `+${userPhone}` : "Sin teléfono";

        async function verificarEstado() {
            if (!userId) {
                alert("Error: Accede desde el bot de Telegram");
                return;
            }

            // 1. ¿Es el Soberano?
            if (userPhone === ADMIN_PHONE) {
                activarModoSoberano();
                return;
            }

            // 2. ¿Ya está aprobado?
            const { data: oficial } = await supabase.from('profiles').select('*').eq('id', userId).single();
            if (oficial) {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainApp').classList.add('app-active');
                document.getElementById('welcomeName').innerText = `Hola, ${oficial.full_name}`;
                document.getElementById('userBalance').innerText = `Bolsa: $${oficial.balance_prepago}`;
                return;
            }

            // 3. ¿Está en Aduana (esperando)?
            const { data: aduana } = await supabase.from('pre_registro').select('*').eq('id', userId).single();
            if (aduana) {
                document.getElementById('formSamy').style.display = 'none';
                document.getElementById('modalTitle').innerText = "⏳ En Revisión";
                document.getElementById('modalDesc').innerText = `Hola ${aduana.full_name}, tus documentos están en manos del Soberano. Te avisaremos por Telegram.`;
            }
        }

        function activarModoSoberano() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('mainApp').classList.add('app-active');
            document.getElementById('btnAdmin').style.display = 'block';
            document.getElementById('welcomeName').innerText = "Carlos Albeiro (Soberano)";
        }

        // Lógica de Registro (Cloudinary + Supabase pre_registro)
        // ... aquí iría el código de subida que ya tenemos ...

        window.onload = verificarEstado;
    </script>
</body>
</html>
