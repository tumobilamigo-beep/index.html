<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy App - Royale Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

<div id="app">
    <header>
        <div class="user-info">
            <h2 id="userName">Samy App</h2>
            <p id="userStatus" style="margin:0; font-size: 11px;"><span class="status-dot"></span> Verificando...</p>
        </div>
        <div id="userBalance" style="font-weight: 800; color: var(--primary); font-size: 20px;">$0</div>
    </header>

    <<div id="screen-home" class="screen">
    
    <!-- Tarjeta del mapa -->
    <div class="card" style="height: 280px; display: flex; flex-direction: column; 
         align-items: center; justify-content: center; background: #f1f5f9; position: relative;">
        
        <!-- Estado inicial -->
        <div id="geo-detecting" style="text-align: center; color: #94a3b8;">
            <i class="fas fa-location-crosshairs fa-3x"></i>
            <p>Detectando ubicación...</p>
        </div>

        <!-- Ubicación obtenida -->
        <div id="geo-ok" style="display:none; text-align: center;">
            <i class="fas fa-location-dot fa-3x" style="color: var(--success);"></i>
            <p style="margin: 8px 0 4px; font-weight: 700; color: var(--dark);" id="geo-coords"></p>
            <p style="margin: 0; font-size: 12px; color: #94a3b8;" id="geo-precision"></p>
        </div>

        <!-- Error de ubicación -->
        <div id="geo-error" style="display:none; text-align: center; color: var(--danger);">
            <i class="fas fa-triangle-exclamation fa-3x"></i>
            <p id="geo-error-msg" style="font-size: 13px;"></p>
            <button onclick="reintentarGeo()" style="background:none; border:1px solid var(--danger); 
                color:var(--danger); padding: 8px 16px; border-radius: 8px; cursor:pointer;">
                Reintentar
            </button>
        </div>
    </div>

    <button class="btn-main" id="btn-solicitar" style="margin-top: 15px;" disabled>
        <i class="fas fa-paper-plane"></i> Solicitar Servicio
    </button>
</div>

    <div id="screen-aduana" class="screen">
        <h3>Gestión de Aduana</h3>
        <div id="lista-aduana"></div>
    </div>

    <nav id="mainNav">
        <div class="nav-item active-nav" onclick="changeScreen('home', this)"><i class="fas fa-compass"></i>Mapa</div>
        <div id="nav-aduana-btn" class="nav-item" style="display:none;" onclick="changeScreen('aduana', this)">
            <i class="fas fa-passport"></i>Aduana <span id="count-badge" class="badge" style="display:none;">0</span>
        </div>
    </nav>
</div>

<div id="modal-review" class="modal-aduana">
    <div class="modal-content">
        <img id="view-foto-perfil" class="img-review">
        <button id="btn-aprobar-final" class="btn-main">Aprobar</button>
        <button onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script type="module">
    import { _supabase, apiService } from './js/api.js';
    import { aduanaModule } from './js/aduana.js';
    import { telegramUtils } from './js/utils.js';
    import { geoModule } from './js/geo.js';

    // ─── Navegación ───────────────────────────────────────────────
    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    window.changeScreen = (type, el) => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
        el.classList.add('active-nav');
        window.showScreen('screen-' + type);
    };

    // ─── Aduana: modal ────────────────────────────────────────────
    window.abrirDetalleAduana = (user) => aduanaModule.abrirDetalle(user);
    window.cerrarModal = () => document.getElementById('modal-review').style.display = 'none';

    // ─── Problema 2: enviarAduana() ───────────────────────────────
    window.enviarAduana = async () => {
        const nombre = document.getElementById('regName').value.trim();
        const doc    = document.getElementById('regDoc').value.trim();

        if (!nombre || !doc) {
            telegramUtils.showError('Completa todos los campos');
            return;
        }

        telegramUtils.setLoading(true);

        const { error } = await _supabase.from('pre_registro').insert([{
            id:               window._chatId,
            phone:            window._phone,
            full_name:        nombre,
            numero_documento: doc,
            status:           'pendiente'
        }]);

        telegramUtils.setLoading(false);

        if (!error) {
            document.getElementById('form-registro').style.display  = 'none';
            document.getElementById('aduana-msg').style.display     = 'block';
            telegramUtils.showSuccess('¡Registro enviado con éxito!');
        } else {
            telegramUtils.showError('Error: ' + error.message);
        }
    };

    // ─── Cargar lista de aspirantes (Soberano) ────────────────────
    async function cargarAduana() {
        const aspirantes = await apiService.getAspirantes();
        const badge = document.getElementById('count-badge');
        badge.textContent = aspirantes.length;
        badge.style.display = aspirantes.length > 0 ? 'inline' : 'none';

        document.getElementById('lista-aduana').innerHTML = aspirantes.map(u => `
            <div class="card" style="cursor:pointer;" onclick='abrirDetalleAduana(${JSON.stringify(u)})'>
                <strong>${u.full_name}</strong>
                <p style="margin:4px 0; font-size:13px; color:#64748b;">
                    📞 ${u.phone} · Doc: ${u.numero_documento}
                </p>
                <p style="margin:0; font-size:11px; color:#94a3b8;">
                    ${telegramUtils.formatDate(u.created_at)}
                </p>
            </div>
        `).join('');
    }

    // ─── Init ─────────────────────────────────────────────────────
   async function init() {
    const { chatId, phone } = telegramUtils.getUrlParams();

    if (!chatId || !phone) {
        document.getElementById('userName').textContent = 'Acceso inválido';
        return;
    }

    window._chatId = Number(chatId);
    window._phone  = phone;

    const { profile, preRegistro } = await apiService.verificarIdentidad(chatId);

    if (profile) {
        document.getElementById('userName').textContent    = profile.full_name;
        document.getElementById('userBalance').textContent = telegramUtils.formatCOP(profile.balance_prepago || 0);

        // ✅ Problema 7: verificación server-side — consulta la DB, no confía en la URL
        const rolData = await apiService.getRolUsuario(chatId);
        const esSoberanoReal = rolData?.role === 'admin' && rolData?.habilitado_por_admin === true;

        if (esSoberanoReal) {
            document.getElementById('nav-aduana-btn').style.display = 'flex';
            await cargarAduana();
        }

        window.showScreen('screen-home');

    } else if (preRegistro) {
        document.getElementById('aduana-msg').style.display = 'block';
        window.showScreen('screen-register');

    } else {
        document.getElementById('form-registro').style.display = 'block';
        window.showScreen('screen-register');
    }
}
    init();
</script>
    
</body> 
</html>
