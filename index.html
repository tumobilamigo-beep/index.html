<script>
    const SUPABASE_URL = "https://fsdqvdxvhqauyqczgsfb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const rawId = params.get('id');
    const chatId = (rawId && rawId !== "DESCONOCIDO") ? rawId : null;
    const phone = params.get('phone') || "000";
    const SOBERANO_PHONE = "573145210546";

    async function init() {
        await verificarEstado(); 
        suscribirCambios();     
    }

    async function verificarEstado() {
        if (phone === SOBERANO_PHONE) {
            setupUI("Carlos Albeiro Troncoso Pulido", "Soberano", "∞", true, true);
            cargarSolicitudesAduana();
        } else {
            if (!chatId) return setupUI("Nuevo Usuario", "ID no detectado", "0", false, false);
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', chatId).maybeSingle();
            if (profile) {
                setupUI(profile.full_name, "Usuario Activo", profile.balance_prepago, true, false);
            } else {
                const { data: pre } = await _supabase.from('pre_registro').select('*').eq('id', chatId).maybeSingle();
                if (pre) {
                    setupUI("Invitado", "En Aduana", "0", false, false);
                    document.getElementById('aduana-msg').style.display = 'block';
                    document.getElementById('form-registro').style.display = 'none';
                } else {
                    setupUI("Nuevo Usuario", "Registro Requerido", "0", false, false);
                    document.getElementById('form-registro').style.display = 'block';
                    document.getElementById('aduana-msg').style.display = 'none';
                }
            }
        }
    }

    function suscribirCambios() {
        _supabase.channel('cambios-perfil').on('postgres_changes', { event: '*', schema: 'public', table: 'profiles', filter: `id=eq.${chatId}` }, () => { verificarEstado(); }).subscribe();
        _supabase.channel('cambios-aduana').on('postgres_changes', { event: '*', schema: 'public', table: 'pre_registro' }, () => {
            if (phone === SOBERANO_PHONE) cargarSolicitudesAduana();
            else verificarEstado();
        }).subscribe();
    }

    function setupUI(name, status, balance, active, isSoberano) {
        document.getElementById('userName').innerText = name;
        document.getElementById('userStatus').innerHTML = `<span class="status-dot" style="background:${active?'#27ae60':'#f1c40f'}"></span> ${status}`;
        document.getElementById('userBalance').innerText = balance === "∞" ? "∞" : "$" + balance;
        document.getElementById('walletAmount').innerText = balance === "∞" ? "∞" : "$" + balance;
        if (isSoberano) document.getElementById('nav-aduana-btn').style.display = 'block';
        if (active) {
            showScreen('screen-home');
            document.getElementById('mainNav').style.opacity = "1";
            document.getElementById('mainNav').style.pointerEvents = "auto";
        } else {
            showScreen('screen-register');
            document.getElementById('mainNav').style.opacity = "0.3";
            document.getElementById('mainNav').style.pointerEvents = "none";
        }
    }

    async function enviarAduana() {
        const nombre = document.getElementById('regName').value;
        const doc = document.getElementById('regDoc').value;
        if (!nombre || !doc) return alert("Completa los datos.");
        if (!chatId) return alert("Error: Abre la app desde el Bot de Telegram.");

        document.getElementById('form-registro').style.display = 'none';
        document.getElementById('aduana-msg').style.display = 'block';

        await _supabase.from('pre_registro').insert([{ 
            id: chatId, full_name: nombre, phone: phone, numero_documento: doc, status: 'pendiente' 
        }]);
        document.getElementById('msg-feedback').style.display = 'block';
    }

    async function cargarSolicitudesAduana() {
        const { data } = await _supabase.from('pre_registro').select('*').eq('status', 'pendiente');
        const container = document.getElementById('lista-aduana');
        if (data && data.length > 0) {
            document.getElementById('count-badge').innerText = data.length;
            document.getElementById('count-badge').style.display = 'inline';
            container.innerHTML = data.map(user => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${user.full_name}</strong><br><small>ID: ${user.id}</small></div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="aprobarUsuario('${user.id}','${user.full_name}','${user.phone}')" style="color:#27ae60; border:none; background:none; font-size:24px; cursor:pointer;"><i class="fas fa-circle-check"></i></button>
                    </div>
                </div>
            `).join('');
        } else {
            document.getElementById('count-badge').style.display = 'none';
            container.innerHTML = `<p style="text-align:center; color:#94a3b8; margin-top:50px;">Aduana vacía.</p>`;
        }
    }

    // FUNCIÓN DE ENVÍO REFORZADA
    async function enviarTelegram(destId, mensaje) {
        const token = "7547466540:AAEYm7Z9_NIdl-O2R0Gsh8pQitE26U_5A4A";
        // Convertimos el ID a número puro para evitar errores de Telegram
        const finalId = Number(destId);

        try {
            const url = `https://api.telegram.org/bot${token}/sendMessage`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    chat_id: finalId, 
                    text: mensaje, 
                    parse_mode: 'Markdown' 
                })
            });
            const r = await response.json();
            if (!r.ok) {
                alert("Error de Telegram: " + r.description);
            } else {
                console.log("Mensaje enviado con éxito a: " + finalId);
            }
        } catch(e) {
            alert("Fallo de conexión al enviar mensaje.");
        }
    }

    async function aprobarUsuario(targetId, nombre, tel) {
        // 1. Crear Perfil
        const { error: err1 } = await _supabase.from('profiles').insert([{ 
            id: targetId, full_name: nombre, phone: tel, balance_prepago: 0 
        }]);

        if (!err1) {
            // 2. Notificar primero (mientras los datos existen)
            await enviarTelegram(targetId, `🌟 *¡Aprobado!* \nHola ${nombre}, el Soberano ha autorizado tu ingreso.`);
            // 3. Borrar de aduana
            await _supabase.from('pre_registro').delete().eq('id', targetId);
            alert("Usuario aprobado y mensaje enviado.");
        } else {
            alert("Error: " + err1.message);
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function changeScreen(type, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
        el.classList.add('active-nav');
        showScreen('screen-' + type);
    }

    init();
</script>
