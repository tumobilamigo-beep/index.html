<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.Telegram.WebApp.ready(); // Avisa al cel antes de que cargue el resto
        window.Telegram.WebApp.expand();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Samy App</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Mantenemos tu diseño pero aseguramos que el body no se bloquee */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system; 
            background: #0f172a; margin: 0; padding: 0; 
            height: 100vh; width: 100vw; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        #app { background: white; height: 100vh; display: flex; flex-direction: column; }
        .screen { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .active { display: block !important; }
        /* Tus estilos siguen aquí... */
        .btn-main { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; }
        nav { display: flex; border-top: 1px solid #eee; padding: 10px 0; background: white; }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 11px; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-loading" class="screen active" style="text-align: center; padding-top: 50px;">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #0088cc;"></i>
        <p>Iniciando Samy App...</p>
    </div>

    <div id="screen-register" class="screen">
        <h2>Registro</h2>
        <input type="text" id="regName" placeholder="Nombre">
        <input type="number" id="regDoc" placeholder="Cédula">
        <button class="btn-main" onclick="enviarAduana()">Solicitar Acceso</button>
    </div>

    <div id="screen-aduana" class="screen">
        <h3>Panel Soberano</h3>
        <div id="lista-aduana"></div>
    </div>

    <div id="screen-home" class="screen">
        <h3>Bienvenido</h3>
        <p>Acceso concedido.</p>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const SUPABASE_URL = "https://fsdqvdxvhqauyqczgsfb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Obtener ID con seguridad
    const chatId = (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : null) || new URLSearchParams(window.location.search).get('id');
    const phone = new URLSearchParams(window.location.search).get('phone') || "000";
    const SOBERANO_PHONE = "573145210546";

    async function start() {
        if (!chatId) {
            alert("No se detectó ID de Telegram. Usa el bot oficial.");
            return;
        }

        try {
            if (phone === SOBERANO_PHONE) {
                show('screen-aduana');
                loadAduana();
            } else {
                const { data: p } = await _supabase.from('profiles').select('*').eq('id', chatId).maybeSingle();
                if (p) show('screen-home');
                else {
                    const { data: r } = await _supabase.from('pre_registro').select('*').eq('id', chatId).maybeSingle();
                    if (r) alert("Aún en aduana...");
                    else show('screen-register');
                }
            }
        } catch (e) {
            console.error(e);
        }
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function enviarAduana() {
        const n = document.getElementById('regName').value;
        const d = document.getElementById('regDoc').value;
        await _supabase.from('pre_registro').insert([{ id: chatId, full_name: n, phone: phone, numero_documento: d }]);
        location.reload(); // Recarga para actualizar estado
    }

    async function loadAduana() {
        const { data } = await _supabase.from('pre_registro').select('*');
        document.getElementById('lista-aduana').innerHTML = data.map(u => `
            <div style="padding:10px; border:1px solid #eee; margin-top:5px;">
                ${u.full_name} <button onclick="aprobar('${u.id}')">OK</button>
            </div>
        `).join('');
    }

    async function aprobar(id) {
        // Tu lógica de aprobación aquí...
        tg.HapticFeedback.notificationOccurred('success');
    }

    // Suscripción Realtime
    _supabase.channel('global').on('postgres_changes',{event:'*',schema:'public'},()=>start()).subscribe();

    start();
</script>
</body>
</html>
